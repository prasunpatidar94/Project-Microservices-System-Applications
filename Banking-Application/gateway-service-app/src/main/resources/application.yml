server:
  port: 9000

spring:
  application:
    name: gateway-service-app

  cloud:
    gateway:
      routes:
        - id: account-service
          uri: lb://account-service-app
          predicates:
            - Path=/api/v1/accounts/**
          filters:
            - StripPrefix=1

        - id: transaction-service
          uri: lb://transaction-service-app
          predicates:
            - Path=/api/v1/transaction/**
          filters:
            - StripPrefix=1

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka